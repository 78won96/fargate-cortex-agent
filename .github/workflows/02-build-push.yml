name: Stage 2 - Build & Push Image

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: Resource name prefix (must match cluster stack)
        required: true
        default: fargate-nginx
      aws_region:
        description: AWS region
        required: true
        default: ap-northeast-2
      auto_deploy:
        description: Trigger Stage 3 deploy after push
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - app/**
      - .github/workflows/02-build-push.yml

permissions:
  id-token: write
  contents: read

env:
  PROJECT_NAME: ${{ github.event.inputs.project_name || 'fargate-nginx' }}
  AWS_REGION: ${{ github.event.inputs.aws_region || 'ap-northeast-2' }}

jobs:
  build:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image metadata
        id: meta
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_SHA::7}"
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          REPO="${{ env.PROJECT_NAME }}"
          IMAGE_URI="${REGISTRY}/${REPO}:${IMAGE_TAG}"
          {
            echo "image_tag=${IMAGE_TAG}"
            echo "image_uri=${IMAGE_URI}"
            echo "registry=${REGISTRY}"
            echo "repo=${REPO}"
          } >> "$GITHUB_OUTPUT"
          echo "Will build: $IMAGE_URI"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Summary
        run: |
          {
            echo "### Image pushed"
            echo ""
            echo "- **Tag:** \`${{ steps.meta.outputs.image_tag }}\`"
            echo "- **URI:** \`${{ steps.meta.outputs.image_uri }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Trigger Stage 3 deploy
    needs: build
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.auto_deploy == 'true'
    uses: ./.github/workflows/03-deploy-service.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
      project_name: ${{ github.event.inputs.project_name || 'fargate-nginx' }}
      aws_region: ${{ github.event.inputs.aws_region || 'ap-northeast-2' }}
    secrets: inherit
