name: Cortex - List Configurations Probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list:
    name: Probe candidate list endpoints
    runs-on: ubuntu-latest
    env:
      CORTEX_FQDN: ${{ secrets.CORTEX_FQDN }}
      CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
      CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
    steps:
      - name: Normalize FQDN
        run: |
          FQDN_CLEAN=$(echo "$CORTEX_FQDN" | sed -E 's#^https?://##; s#/+$##')
          echo "CORTEX_FQDN_CLEAN=$FQDN_CLEAN" >> "$GITHUB_ENV"

      - name: Try candidate endpoints
        run: |
          set -uo pipefail

          call() {
            local path="$1"
            local body="${2:-{\"request_data\":{}}}"
            echo ""
            echo "============================================"
            echo "POST /$path"
            echo "Body: $body"
            HTTP_CODE=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST "https://${CORTEX_FQDN_CLEAN}/public_api/v1/${path}" \
              -H "Authorization: ${CORTEX_API_KEY}" \
              -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              --data "$body")
            echo "HTTP $HTTP_CODE"
            if jq -e . /tmp/resp.json >/dev/null 2>&1; then
              # Mask anything that looks like a URL or a long token
              jq '(.. | strings) |= (if (test("^https?://") or (length > 100)) then "<redacted-long-or-url>" else . end)' /tmp/resp.json | head -c 4000
              echo ""
            else
              head -c 800 /tmp/resp.json
              echo ""
            fi
          }

          # Candidate "list" / "get" endpoints. Most return 404 / 400 — that's fine,
          # we are just looking for the one that returns 200 with a list of configurations.
          call "distributions/get_versions"
          call "distributions/get_agent_versions"
          call "distributions/get_yaml_configurations"
          call "distributions/get_configurations"
          call "distributions/list_configurations"
          call "distributions/list"
          call "yaml_configurations/get"
          call "yaml_configurations/list"
          call "yaml_configurations/get_configurations"
          call "agent_configurations/get_agent_configurations"
          call "policies/get_policies"
          call "profiles/get_profiles"
          call "profiles/get_caas_profiles"
          call "endpoint_groups/get_endpoint_groups"
